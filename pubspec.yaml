name: ask_ucp_flutter
description: "Campus app for University of Central Punjab"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: 2.5.1
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.11
  webview_flutter_wkwebview: ^3.13.0
  go_router: 14.2.0
  intl: 0.19.0
  freezed_annotation: 2.4.4
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_annotation: 4.9.0
  json_serializable: ^6.9.5
  firebase_core: 3.6.0
  firebase_auth: 5.1.4
  cloud_firestore: 5.4.4
  firebase_storage: 12.3.3
  firebase_messaging: 15.1.3
  firebase_analytics: 11.3.3
  image_picker: 1.1.2
  file_picker: 8.1.2
  url_launcher: 6.3.0
  google_maps_flutter: 2.9.0
  geolocator: 13.0.2
  dio: 5.6.0
  shared_preferences: 2.3.2
  flutter_dotenv: 5.2.1
  google_fonts: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  flutter_map_marker_cluster: ^1.3.6
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/maps/
    - assets/images/
    - assets/images/ucp_bg.jpg

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21